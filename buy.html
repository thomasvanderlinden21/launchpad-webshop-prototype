          ['Connectivity', '5G, 4G, 3G, 2G, Wi-Fi, Bluetooth'],
          ['Printer', 'Built-in thermal'],
          ['Interface', 'Touchscreen'],
          ['Card Reader', 'Contactless, chip & PIN, magstripe'],
          ['Security', 'PCI PTS certified'],
          ['Price', '€449 one-time'],
        ]
      },
      'pay-by-link': {
        name: 'Pay by Link',
        images: ['assets/placeholder-terminal.svg'],
        price: 'From €0',
        priceDisplay: 'From €0.00',
        priceNote: 'Transaction fees apply.',
        heroDescription: 'Accept payments remotely without any hardware. Send a payment link via email or SMS and let your customers pay instantly from any device — supporting Apple Pay, Google Pay, and all major cards.',
        payMethods: ['Apple Pay', 'Google Pay', 'Visa', 'Mastercard', 'AMEX', 'Contactless'],
        featBullets: ['No hardware required', 'Send links via email or SMS', 'Apple Pay & Google Pay support', 'Works on any device'],
        faqs: [
          { q: 'How does Pay by Link work?', a: 'You generate a unique payment link from your Worldline dashboard and send it to your customer via email, SMS, or messaging app. The customer clicks the link, enters their payment details, and the payment is confirmed in seconds.' },
          { q: 'Does the customer need to create an account to pay?', a: 'No. Customers pay as guests — no account or app download required. They simply click the link and pay with any supported card or digital wallet.' },
          { q: 'How long is a payment link valid?', a: 'By default, links expire after 7 days. You can customise the expiry period in your dashboard, from a few hours to 30 days.' },
          { q: 'Is there a limit on the payment amount?', a: 'Standard limits apply based on your account tier. Most businesses can process up to €10,000 per transaction. Higher limits are available on request.' },
          { q: 'What happens if the customer doesn\'t pay?', a: 'You\'ll receive a notification when the link is viewed and when payment is completed or abandoned. Unpaid links simply expire — there are no charges for uncompleted payments.' },
        ],
        specs: [
          ['Hardware', 'None required'],
          ['Delivery', 'Email or SMS'],
          ['Setup', 'Instant'],
          ['Payment Methods', 'All major cards + wallets'],
          ['Pricing', 'From €0'],
          ['Security', 'PCI DSS compliant'],
        ]
      }
    };

    function render() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const p = PRODUCTS[id];

      if (!p) {
        document.body.innerHTML = '<div class="flex items-center justify-center h-screen text-gray-400">Product not found. <a href="index.html" class="ml-2 underline text-[#277777]">Go back</a></div>';
        return;
      }

      document.title = 'Buy ' + p.name + ' – Webshop';

      document.getElementById('hero-title').textContent = p.name;
      document.getElementById('hero-description').textContent = p.heroDescription;

      // Build carousel from product images
      const imgs = p.images || ['assets/placeholder-terminal.svg'];
      document.getElementById('carousel-track').innerHTML = imgs.map(src => `
        <div class="min-w-full h-full flex items-center justify-center p-10">
          <img src="${src}" alt="${p.name}" class="h-[380px] w-auto object-contain product-image" />
        </div>
      `).join('');

      // Dots — hide everything when only 1 image
      const dotsEl = document.getElementById('carousel-dots');
      const prevBtn = document.getElementById('carousel-prev');
      const nextBtn = document.getElementById('carousel-next');
      if (imgs.length <= 1) {
        dotsEl.style.display = 'none';
        prevBtn.style.display = 'none';
        nextBtn.style.display = 'none';
      } else {
        dotsEl.innerHTML = imgs.map((_, i) =>
          `<button onclick="carouselGo(${i})" class="carousel-dot w-2 h-2 rounded-full transition-all" style="background:${i === 0 ? '#121621' : '#c8d0d0'};"></button>`
        ).join('');
      }

      CAROUSEL_TOTAL = imgs.length;
      document.getElementById('price-display').textContent = p.priceDisplay;
      document.getElementById('price-note-inline').textContent = p.priceNote;

      // Learn more & back links → product.html
      const learnUrl = `product.html?id=${id}`;
      document.getElementById('hero-learn-link').href = learnUrl;
      document.getElementById('sticky-learn-link').href = learnUrl;
      document.getElementById('sticky-back-btn').href = learnUrl;



      // Hero add button
      const addBtn = document.getElementById('hero-add-btn');
      addBtn.textContent = `Add to basket — ${p.priceDisplay}`;
      addBtn.onclick = () => addToCart(id);

      // Sticky bar
      document.getElementById('sticky-name').textContent = p.name;
      const stickyBtn = document.getElementById('sticky-add-btn');
      stickyBtn.textContent = 'Add to basket';
      stickyBtn.onclick = () => addToCart(id);

      // USPs
      document.getElementById('feat-bullets-hero').innerHTML = p.featBullets.map(b =>
        `<li class="flex items-center gap-2">
           <svg class="w-3.5 h-3.5 text-[#277777] flex-shrink-0" viewBox="0 0 16 16" fill="none"><path d="M3 8l3.5 3.5L13 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
           <span class="text-[13px] text-[#525d5d]">${b}</span>
         </li>`
      ).join('');

      // FAQ section
      const faqList = document.getElementById('faq-list');
      if (p.faqs && p.faqs.length) {
        faqList.innerHTML = p.faqs.map((item, i) => `
          <div class="border-b border-black/[0.06] ${i === 0 ? 'border-t' : ''}">
            <button onclick="toggleAccordion(this)" class="w-full flex items-center justify-between py-5 text-left gap-6">
              <span class="text-[15px] font-medium text-[#121621]">${item.q}</span>
              <svg class="w-5 h-5 text-[#6b7676] flex-shrink-0 transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
            </button>
            <div class="hidden pb-5">
              <p class="text-[15px] text-[#6b7676] leading-[1.7]">${item.a}</p>
            </div>
          </div>`).join('');
      }

      // Specifications panel
      document.getElementById('hero-specs-body').innerHTML = p.specs.map(([k, v]) =>
        `<div class="flex items-center justify-between py-2 border-b border-[#f0f2f2] last:border-0">
           <span class="text-[13px] text-[#6b7676]">${k}</span>
           <span class="text-[13px] font-medium text-[#121621] text-right">${v}</span>
         </div>`
      ).join('');

      // Accessories panel
      let accList = [];
      if (id === 'link-2500' && typeof LINK2500_ACCESSORIES !== 'undefined') accList = LINK2500_ACCESSORIES;
      else if (id === 'saturn-1000f2' && typeof SATURN1000F2_ACCESSORIES !== 'undefined') accList = SATURN1000F2_ACCESSORIES;
      const accWrap = document.getElementById('hero-acc-wrap');
      if (accList.length) {
        accWrap.classList.remove('hidden');
        document.getElementById('hero-acc-body').innerHTML = accList.map(a => {
          const accImg = a.image
            ? `<img src="${a.image}" alt="${a.name}" class="w-full h-full object-contain p-1" />`
            : `<div class="w-5 h-5 bg-[#e0e6e6] rounded"></div>`;
          return `
            <div class="flex items-center gap-3 py-2 border-b border-[#f0f2f2] last:border-0">
              <div class="w-10 h-10 bg-[#f5f7f7] rounded-[8px] flex items-center justify-center flex-shrink-0 overflow-hidden">${accImg}</div>
              <div class="flex-1 min-w-0">
                <p class="text-[13px] font-medium text-[#121621] truncate">${a.name}</p>
                <p class="text-[12px] text-[#6b7676]">${a.priceLabel}</p>
              </div>
              <button onclick="addAddonToCart('${a.id}','${a.name.replace(/'/g,"\\'")}',${a.price},'${a.priceLabel}','${(a.image||'').replace(/'/g,"\\'")}')" class="text-[12px] font-medium text-[#277777] border border-[#277777] rounded-[6px] px-3 py-1.5 hover:bg-[#f0f7f7] transition-colors flex-shrink-0">Add</button>
            </div>`;
        }).join('');
      }

    }

    function toggleAccordion(btn) {
      const body = btn.nextElementSibling;
      const chevron = btn.querySelector('svg');
      const isOpen = !body.classList.contains('hidden');
      body.classList.toggle('hidden', isOpen);
      chevron.style.transform = isOpen ? '' : 'rotate(180deg)';
    }

    // Carousel state — must be declared before render() runs
    let carouselIndex = 0;
    let CAROUSEL_TOTAL = 1;



    function carouselUpdate() {
      document.getElementById('carousel-track').style.transform = `translateX(-${carouselIndex * 100}%)`;
      document.querySelectorAll('.carousel-dot').forEach((dot, i) => {
        dot.style.background = i === carouselIndex ? '#121621' : '#c8d0d0';
        dot.style.width = i === carouselIndex ? '20px' : '8px';
        dot.style.borderRadius = '99px';
      });
    }

    function carouselMove(dir) {
      carouselIndex = (carouselIndex + dir + CAROUSEL_TOTAL) % CAROUSEL_TOTAL;
      carouselUpdate();
    }

    function carouselGo(i) {
      carouselIndex = i;
      carouselUpdate();
    }

    // Auto-advance
    setInterval(() => carouselMove(1), 4000);

    (function () {
      const nav = document.querySelector('header');
      const bar = document.getElementById('product-sticky-bar');
      const NAV_H = 72;
      let lastY  = window.scrollY;
      let hidden = false;

      window.addEventListener('scroll', () => {
        const y = window.scrollY;
        if (y > NAV_H) {
          if (y > lastY && !hidden) {
            nav.style.transform = 'translateY(-100%)';
            bar.style.top = '0px';
            hidden = true;
          } else if (y < lastY && hidden) {
            nav.style.transform = 'translateY(0)';
            bar.style.top = NAV_H + 'px';
            hidden = false;
          }
        } else if (hidden) {
          nav.style.transform = 'translateY(0)';
          bar.style.top = NAV_H + 'px';
          hidden = false;
        }
        lastY = y;
      }, { passive: true });
    })();
  </script>
  <script src="cart.js"></script>
  <script>render();</script>
</body>
</html>
