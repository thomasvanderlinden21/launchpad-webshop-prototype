<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout – Webshop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />
  <script>
  (function (m, a, z, e) {

    try {
      t = m.sessionStorage.getItem('maze-us');

    if (!t) {

      return w[w.length - 1];

    v = u && u.nonce;
    s = a.createElement('script');
    s.src = z + '?apiKey=' + e;
    s.async = true;
    if (v) s.setAttribute('nonce', v);
    a.getElementsByTagName('head')[0].appendChild(s);

  })(window, document, 'https://snippet.maze.co/maze-universal-loader.js', '9228364a-fc17-41e8-a324-bd75dfce2eae');

  <style>
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body class="bg-[#f5f7f7] text-[#121621] min-h-screen">

  <!-- Nav -->
  <header class="bg-white/85 backdrop-blur-xl border-b border-black/[0.06] h-[72px] flex items-center px-24 sticky top-0 z-[10000]">
    <a href="home.html" aria-label="Worldline" class="flex-shrink-0">
      <img src="logo.svg" alt="Worldline" width="160" height="16" style="display:block">
    </a>
    <div class="absolute left-1/2 -translate-x-1/2 flex items-center gap-2 text-sm text-[#6b7676]">
      <span class="text-[#277777] font-medium">Basket</span>
      <svg class="w-4 h-4 text-[#c8d0d0]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
      <span class="text-[#121621] font-semibold">Checkout</span>
      <svg class="w-4 h-4 text-[#c8d0d0]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
      <span class="text-[#9aa5a5]">Confirmation</span>
    </div>
    <div class="ml-auto flex items-center gap-2 text-sm text-[#6b7676]">
      <svg class="w-4 h-4 text-[#277777]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path stroke-linecap="round" stroke-linejoin="round" d="M7 11V7a5 5 0 0110 0v4"/></svg>
      Secure checkout
    </div>
  </header>

  <main class="max-w-[1100px] mx-auto px-16 py-12">
    <div class="grid grid-cols-[1fr_380px] gap-10 items-start">

      <!-- Left: form -->
      <div class="flex flex-col gap-8">

        <!-- Contact -->
        <div class="bg-white rounded-[16px] p-8 border border-[#ebebeb]">
          <h2 class="text-[17px] font-semibold text-[#121621] mb-6">Contact information</h2>
          <div class="grid grid-cols-2 gap-4">
            <div class="flex flex-col gap-1.5">
              <label class="text-[13px] font-medium text-[#525d5d]">First name</label>
              <input type="text" placeholder="Jane" class="h-11 px-4 border border-[#d4d8d8] rounded-[8px] text-[15px] text-[#121621] outline-none focus:border-[#277777] transition-colors placeholder-[#b0b8b8] bg-white" />
            </div>
            <div class="flex flex-col gap-1.5">
              <label class="text-[13px] font-medium text-[#525d5d]">Last name</label>
              <input type="text" placeholder="Smith" class="h-11 px-4 border border-[#d4d8d8] rounded-[8px] text-[15px] text-[#121621] outline-none focus:border-[#277777] transition-colors placeholder-[#b0b8b8] bg-white" />
            </div>
            <div class="flex flex-col gap-1.5 col-span-2">
              <label class="text-[13px] font-medium text-[#525d5d]">Business email</label>
              <input type="email" placeholder="jane@company.com" class="h-11 px-4 border border-[#d4d8d8] rounded-[8px] text-[15px] text-[#121621] outline-none focus:border-[#277777] transition-colors placeholder-[#b0b8b8] bg-white" />
            </div>
            <div class="flex flex-col gap-1.5 col-span-2">
              <label class="text-[13px] font-medium text-[#525d5d]">Phone number</label>
              <input type="tel" placeholder="+44 20 0000 0000" class="h-11 px-4 border border-[#d4d8d8] rounded-[8px] text-[15px] text-[#121621] outline-none focus:border-[#277777] transition-colors placeholder-[#b0b8b8] bg-white" />
            </div>
          </div>
        </div>

        <!-- Delivery -->
        <div class="bg-white rounded-[16px] p-8 border border-[#ebebeb]">
          <h2 class="text-[17px] font-semibold text-[#121621] mb-6">Delivery address</h2>
          <div class="grid grid-cols-2 gap-4">
            <div class="flex flex-col gap-1.5 col-span-2">
              <label class="text-[13px] font-medium text-[#525d5d]">Company name</label>
              <input type="text" placeholder="Acme Ltd." class="h-11 px-4 border border-[#d4d8d8] rounded-[8px] text-[15px] text-[#121621] outline-none focus:border-[#277777] transition-colors placeholder-[#b0b8b8] bg-white" />
            </div>
            <div class="flex flex-col gap-1.5 col-span-2">
              <label class="text-[13px] font-medium text-[#525d5d]">Street address</label>
              <input type="text" placeholder="123 High Street" class="h-11 px-4 border border-[#d4d8d8] rounded-[8px] text-[15px] text-[#121621] outline-none focus:border-[#277777] transition-colors placeholder-[#b0b8b8] bg-white" />
            </div>
            <div class="flex flex-col gap-1.5">
              <label class="text-[13px] font-medium text-[#525d5d]">City</label>
              <input type="text" placeholder="London" class="h-11 px-4 border border-[#d4d8d8] rounded-[8px] text-[15px] text-[#121621] outline-none focus:border-[#277777] transition-colors placeholder-[#b0b8b8] bg-white" />
            </div>
            <div class="flex flex-col gap-1.5">
              <label class="text-[13px] font-medium text-[#525d5d]">Postcode</label>
              <input type="text" placeholder="EC1A 1BB" class="h-11 px-4 border border-[#d4d8d8] rounded-[8px] text-[15px] text-[#121621] outline-none focus:border-[#277777] transition-colors placeholder-[#b0b8b8] bg-white" />
            </div>
            <div class="flex flex-col gap-1.5 col-span-2">
              <label class="text-[13px] font-medium text-[#525d5d]">Country</label>
              <select class="h-11 px-4 border border-[#d4d8d8] rounded-[8px] text-[15px] text-[#121621] outline-none focus:border-[#277777] transition-colors bg-white appearance-none">
                <option>United Kingdom</option>
                <option>Netherlands</option>
                <option>Belgium</option>
                <option>Germany</option>
                <option>France</option>
                <option>Spain</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Payment -->
        <div class="bg-white rounded-[16px] p-8 border border-[#ebebeb]">
          <h2 class="text-[17px] font-semibold text-[#121621] mb-6">Payment</h2>
          <div class="flex flex-col gap-3">
            <!-- Card option selected -->
            <label class="flex items-center gap-4 border-2 border-[#277777] rounded-[10px] px-5 py-4 cursor-pointer bg-white">
              <input type="radio" name="payment" checked class="accent-[#277777]" />
              <span class="text-[15px] font-medium text-[#121621]">Credit / Debit card</span>
              <div class="ml-auto flex items-center gap-2">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Visa.svg" alt="Visa" class="h-5 w-auto opacity-80" />
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard" class="h-5 w-auto opacity-80" />
              </div>
            </label>
            <label class="flex items-center gap-4 border border-[#e6ebeb] rounded-[10px] px-5 py-4 cursor-pointer bg-white hover:border-[#277777] transition-colors">
              <input type="radio" name="payment" class="accent-[#277777]" />
              <span class="text-[15px] font-medium text-[#121621]">Bank transfer / SEPA</span>
            </label>
          </div>
          <div class="grid grid-cols-2 gap-4 mt-5">
            <div class="flex flex-col gap-1.5 col-span-2">
              <label class="text-[13px] font-medium text-[#525d5d]">Card number</label>
              <input type="text" placeholder="1234 5678 9012 3456" class="h-11 px-4 border border-[#d4d8d8] rounded-[8px] text-[15px] text-[#121621] outline-none focus:border-[#277777] transition-colors placeholder-[#b0b8b8] bg-white" />
            </div>
            <div class="flex flex-col gap-1.5">
              <label class="text-[13px] font-medium text-[#525d5d]">Expiry date</label>
              <input type="text" placeholder="MM / YY" class="h-11 px-4 border border-[#d4d8d8] rounded-[8px] text-[15px] text-[#121621] outline-none focus:border-[#277777] transition-colors placeholder-[#b0b8b8] bg-white" />
            </div>
            <div class="flex flex-col gap-1.5">
              <label class="text-[13px] font-medium text-[#525d5d]">CVC</label>
              <input type="text" placeholder="123" class="h-11 px-4 border border-[#d4d8d8] rounded-[8px] text-[15px] text-[#121621] outline-none focus:border-[#277777] transition-colors placeholder-[#b0b8b8] bg-white" />
            </div>
          </div>
        </div>

      </div>

      <!-- Right: order summary -->
      <div class="flex flex-col gap-4 sticky top-[88px]">
        <div class="bg-white rounded-[16px] border border-[#ebebeb] p-6">
          <h2 class="text-[15px] font-semibold text-[#121621] mb-5">Order summary</h2>
          <div id="checkout-items" class="flex flex-col gap-4 mb-5"></div>
          <div class="border-t border-[#f0f2f2] pt-4 flex flex-col gap-2">
            <div class="flex justify-between text-[14px] text-[#6b7676]">
              <span>Subtotal</span><span id="co-subtotal">—</span>
            </div>
            <div class="flex justify-between text-[14px] text-[#6b7676]">
              <span>VAT (20%)</span><span id="co-vat">—</span>
            </div>
            <div class="flex justify-between text-[15px] font-semibold text-[#121621] pt-1 border-t border-[#f0f2f2] mt-1">
              <span>Total</span><span id="co-total">—</span>
            </div>
          </div>
        </div>

        <button onclick="placeOrder()" class="w-full h-12 bg-[#277777] text-white font-semibold text-[15px] rounded-[10px] hover:bg-[#1f5c5c] transition-colors flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path stroke-linecap="round" stroke-linejoin="round" d="M7 11V7a5 5 0 0110 0v4"/></svg>
          Place order
        </button>
        <p class="text-[12px] text-[#9aa5a5] text-center leading-5">By placing your order you agree to our <a href="#" class="underline hover:text-[#277777]">Terms & Conditions</a> and <a href="#" class="underline hover:text-[#277777]">Privacy Policy</a>.</p>

        <!-- Trust -->
        <div class="flex items-center justify-center gap-5 pt-1">
          <div class="flex items-center gap-1.5 text-[12px] text-[#9aa5a5]">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path stroke-linecap="round" stroke-linejoin="round" d="M7 11V7a5 5 0 0110 0v4"/></svg>
            SSL encrypted
          </div>
          <div class="flex items-center gap-1.5 text-[12px] text-[#9aa5a5]">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            PCI compliant
          </div>
        </div>
      </div>

    </div>
  </main>

  <script src="cart.js"></script>
  <script>
    function fmt(n) { return '€' + Number(n).toFixed(2); }

    function renderSummary() {
      const cart = getCart();
      const itemsEl = document.getElementById('checkout-items');
      itemsEl.innerHTML = cart.map(item => `
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 bg-[#f5f7f7] rounded-[8px] flex-shrink-0 flex items-center justify-center overflow-hidden">
            <img src="${item.image || 'assets/placeholder-terminal.svg'}" alt="${item.name}" class="w-10 h-10 object-contain" onerror="this.src='assets/placeholder-terminal.svg'" />
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-[13px] font-medium text-[#121621] truncate">${item.name}</p>
            <p class="text-[12px] text-[#9aa5a5]">Qty ${item.qty}</p>
          </div>
          <span class="text-[13px] font-semibold text-[#121621] flex-shrink-0">${fmt((item.price || 0) * item.qty)}</span>
        </div>
      `).join('');

      const subtotal = cart.reduce((s, i) => s + (i.price || 0) * i.qty, 0);
      const vat = subtotal * 0.2;
      const total = subtotal + vat;
      document.getElementById('co-subtotal').textContent = fmt(subtotal);
      document.getElementById('co-vat').textContent = fmt(vat);
      document.getElementById('co-total').textContent = fmt(total);
    }

    function placeOrder() {
      localStorage.removeItem('ws_cart');
      window.location.href = 'confirmation.html';
    }

    renderSummary();
  </script>

</body>
</html>
